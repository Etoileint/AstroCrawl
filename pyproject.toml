[[tool.astroproject.members]]
name = "astrobasis"
description = "Pure mechanism layer — zero hard dependencies"

[[tool.astroproject.members]]
name = "astrocrawl"
description = "Async web crawler powered by Playwright + AI"

[[tool.astroproject.members]]
name = "astroframe"
description = "Universal plugin platform runtime — Protocol + registry + sandbox"

[[tool.astroproject.members]]
name = "astroweave"
description = "Workflow engine — orchestrate crawl, AI, and rules pipelines as composable DAGs"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = ["__pycache__/", ".pytest_cache/", ".mypy_cache/", "build/"]

[tool.pytest.ini_options]
minversion = "7.0"
asyncio_mode = "auto"
addopts = ["-v", "--tb=short", "--strict-markers"]
markers = [
    "gui: GUI tests requiring QApplication (offscreen QPA)",
    "plugin_migration: Plugin system migration tests — requires ASTROCRAWL_PLUGINS=1",
]

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["__pycache__", ".git", ".pytest_cache", ".mypy_cache"]

[tool.ruff.lint]
extend-select = [
    "I",     # isort — import sorting
    "FA100", # flake8-future-annotations — require from __future__ import annotations
    "C4",    # flake8-comprehensions — unnecessary comprehensions
    "ERA",   # eradicate — commented-out code
    "TCH",   # flake8-type-checking — typing imports to TYPE_CHECKING
    "RUF100",# unused noqa
    "B",     # flake8-bugbear — common bug patterns
    "T20",   # flake8-print
    "PT",    # flake8-pytest-style
]

[tool.ruff.lint.per-file-ignores]
"astrocrawl/astrocrawl/main.py" = ["T201"]
"astrocrawl/astrocrawl/config.py" = ["T201"]
"astrocrawl/astrocrawl/crawler/progress.py" = ["T201"]
"astrocrawl/astrocrawl/cli/**/*.py" = ["T201"]
"astrocrawl/astrocrawl/**/*.py" = ["ERA", "PT", "B008"]
"astrocrawl/tests/**/*.py" = ["ERA", "PT", "B017"]
"astrobasis/astrobasis/_logging.py" = ["T201"]
"astrobasis/tests/**/*.py" = ["ERA", "PT"]
"astroframe/astroframe/**/*.py" = ["ERA", "PT", "B008"]
"astroframe/tests/**/*.py" = ["ERA", "PT", "B017"]
"astroweave/astroweave/**/*.py" = ["ERA", "PT", "B008"]
"astroweave/tests/**/*.py" = ["ERA", "PT", "B017"]
"scripts/**/*.py" = ["ERA", "T201", "B007"]
"docs/**/*.py" = ["T201", "B007"]
"astrocrawl/tests/manual/**/*.py" = ["T201"]
"astrocrawl/astrocrawl/crawler/outcomes.py" = ["TC001"]
"astrocrawl/tests/test_gui_mainwindow_behavior.py" = ["B015"]

[tool.ruff.lint.isort]
known-first-party = ["astroproject", "astrocrawl", "astrobasis", "astroframe", "astroweave"]
required-imports = ["from __future__ import annotations"]
split-on-trailing-comma = false

[tool.coverage.run]
source = ["astrobasis", "astrocrawl", "astroframe", "astroweave"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
