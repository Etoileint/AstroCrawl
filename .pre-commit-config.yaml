repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.0
    hooks:
      - id: codespell
        # finshed: test_signals.py:39 + 2 archive docs 故意保留
        # （测试/文档引述属性名拼写错误的行为，非笔误）
        args: [--write-changes, --ignore-words-list=finshed]

  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff-lint
        entry: ruff check --fix
        language: system
        types: [python]
      - id: ruff-fmt
        name: ruff-fmt
        entry: ruff format
        language: system
        types: [python]
      - id: i18n-check
        name: i18n-check
        entry: python scripts/check_i18n.py
        language: system
        types: [python]
        files: ^astrocrawl/
      - id: i18n-ts-dicts
        name: i18n-ts-dicts
        entry: python scripts/check_ts_dicts.py astrocrawl/gui/translations/astrocrawl_gui_zh_CN.ts
        language: system
        files: ^astrocrawl/gui/translations/.*\.ts$
        pass_filenames: false
      - id: i18n-qm-fresh
        name: i18n-qm-fresh
        entry: python scripts/check_qm_fresh.py
        language: system
        files: ^astrocrawl/gui/translations/
        pass_filenames: false
      - id: logfmt-check
        name: logfmt-check
        entry: python scripts/check_logfmt.py
        language: system
        types: [python]
        files: ^astrocrawl/
